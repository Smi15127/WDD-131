<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Card</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="card">

    <img src="character.png" alt="Character Image" class="character-img">

    <div class="name-bar">
        <h2 id="name">Flaming Pomuranian</h2>
    </div>

    <div class="stats">

        <p><strong>Class:</strong> <span id="class">Fire Floof</span></p>

        <p><strong>Level:</strong> <span id="level">5</span></p>

        <p><strong>Health:</strong> 
        <span id="health">100</span> / <span id="maxHealth">100</span>
        </p>

        <p><strong>Defense:</strong> <span id="defense">5</span></p>

    </div>

    <div class="buttons">
        <button onclick="takeDamage()">Attacked</button>
        <button onclick="levelUp()">Level Up</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
